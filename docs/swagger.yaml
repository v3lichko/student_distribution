basePath: /
definitions:
  api.Student:
    properties:
      full_name:
        type: string
      group_number:
        type: integer
      isu:
        type: integer
      score:
        type: integer
      telegram:
        type: string
    type: object
  models.Group:
    properties:
      capacity:
        type: integer
      number:
        type: integer
    type: object
  models.GroupDistribution:
    properties:
      group_number:
        type: integer
      students:
        items:
          $ref: '#/definitions/models.Student'
        type: array
    type: object
  models.Student:
    properties:
      full_name:
        type: string
      group_number:
        type: integer
      isu:
        type: integer
      score:
        type: integer
      telegram:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  title: Student Distribution API
  version: "1.0"
paths:
  /distribution:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.GroupDistribution'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get current distribution
      tags:
      - distribution
  /distribution/export:
    get:
      produces:
      - text/csv
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Export distribution as CSV
      tags:
      - distribution
  /distribution/run:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Student'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Run distribution algorithm
      tags:
      - distribution
  /groups:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Group'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all groups
      tags:
      - groups
    post:
      consumes:
      - application/json
      parameters:
      - description: Group data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.Group'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Group'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create group
      tags:
      - groups
  /students:
    delete:
      parameters:
      - description: ISU number
        in: query
        name: isu
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete student
      tags:
      - students
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api.Student'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all students
      tags:
      - students
    post:
      consumes:
      - application/json
      parameters:
      - description: Student data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.Student'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.Student'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create student
      tags:
      - students
  /students/import:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: CSV file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Import students from CSV
      tags:
      - students
swagger: "2.0"
