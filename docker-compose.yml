services:
  postgres:
    image: postgres:16-alpine
    container_name: student_database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
    - "${POSTGRES_PORT}:5433"
    volumes:
    - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: